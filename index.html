<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>変容を楽しむカードセッション 〜まどろみの麓〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#11132a;
    --night-mid:#232a52;
    --night-soft:#323a68;
    --gold:#c9a668;
    --gold-soft:#e2cd9a;
    --cream:#f6f0e2;
    --cream-dim:#efe6d2;
    --plum:#463659;
    --rose:#d69aab;
    --rose-deep:#b5677c;
    --ink:#2a2438;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Zen Kaku Gothic New', sans-serif;
    background:var(--cream);
    color:var(--ink);
    overflow-x:hidden;
    line-height:1.9;
    letter-spacing:.02em;
  }
  h1,h2,h3,.serif{
    font-family:'Shippori Mincho', serif;
  }
  .en{
    font-family:'Cormorant Garamond', serif;
    letter-spacing:.18em;
  }
  a{color:inherit;}
  img{max-width:100%; display:block;}

  /* ---------- moon phase scroll indicator ---------- */
  .phase-rail{
    position:fixed;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    z-index:60;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .phase-rail .track{
    width:2px;
    height:140px;
    background:linear-gradient(to bottom, rgba(201,166,104,.15), rgba(201,166,104,.55));
    position:relative;
    border-radius:2px;
  }
  .phase-rail .moon-icon{
    width:26px; height:26px;
    border-radius:50%;
    position:relative;
    background:var(--gold-soft);
    box-shadow:0 0 14px rgba(226,205,154,.6);
    overflow:hidden;
    flex:none;
  }
  .phase-rail .moon-icon::after{
    content:'';
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    border-radius:50%;
    background:var(--night-deep);
    transform:translateX(var(--shadow-x, 26px));
    transition:transform .15s linear;
  }
  .phase-label{
    font-family:'Cormorant Garamond', serif;
    font-size:.62rem;
    letter-spacing:.22em;
    color:var(--plum);
    writing-mode:vertical-rl;
  }
  @media (max-width:820px){ .phase-rail{display:none;} }

  /* ---------- shared ---------- */
  section{ position:relative; }
  .wrap{ max-width:1040px; margin:0 auto; padding:0 24px; }
  .eyebrow{
    font-family:'Cormorant Garamond', serif;
    letter-spacing:.4em;
    font-size:.72rem;
    text-transform:uppercase;
    opacity:.75;
  }
  .fade-up{
    opacity:0;
    transform:translateY(28px);
    transition:opacity 1s ease, transform 1s ease;
  }
  .fade-up.in{ opacity:1; transform:none; }
  .divider{
    width:1px; height:46px;
    background:linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin:34px auto;
    position:relative;
  }
  .divider::after{
    content:'◆';
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    font-size:.55rem;
    color:var(--gold);
    background:inherit;
  }

  /* ---------- HERO ---------- */
  .hero{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(120,110,190,.35), transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(180,120,150,.18), transparent 50%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 60%, var(--night-soft) 100%);
    color:var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:90px 24px 60px;
    overflow:hidden;
  }
  .stars{ position:absolute; inset:0; z-index:0; }
  .stars span{
    position:absolute;
    width:2px; height:2px;
    background:#fff;
    border-radius:50%;
    animation:twinkle 4s ease-in-out infinite;
    opacity:.6;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.2; }
    50%{ opacity:1; }
  }
  .hero-moon{
    width:96px; height:96px;
    border-radius:50%;
    background:var(--gold-soft);
    box-shadow:0 0 60px rgba(226,205,154,.45), 0 0 120px rgba(226,205,154,.15);
    position:relative;
    margin-bottom:34px;
    z-index:1;
  }
  .hero-moon::after{
    content:'';
    position:absolute; top:-6px; left:20px;
    width:100%; height:100%;
    border-radius:50%;
    background:var(--night-deep);
  }
  .hero-badge{
    z-index:1;
    display:inline-block;
    padding:9px 26px;
    border:1px solid var(--gold);
    border-radius:999px;
    font-size:.78rem;
    letter-spacing:.3em;
    color:var(--gold-soft);
    margin-bottom:30px;
  }
  .hero h1{
    z-index:1;
    font-size:clamp(2.1rem, 6vw, 3.6rem);
    font-weight:600;
    line-height:1.55;
    margin-bottom:18px;
  }
  .hero h1 small{
    display:block;
    font-family:'Cormorant Garamond', serif;
    font-size:.4em;
    letter-spacing:.3em;
    color:var(--gold-soft);
    font-weight:400;
    margin-bottom:12px;
  }
  .hero .sub{
    z-index:1;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.15rem;
    color:var(--rose);
    margin-bottom:26px;
    letter-spacing:.08em;
  }
  .hero .tagline{
    z-index:1;
    font-size:1.05rem;
    color:var(--cream-dim);
    max-width:26em;
  }
  .scroll-cue{
    z-index:1;
    margin-top:56px;
    font-size:.68rem;
    letter-spacing:.3em;
    color:var(--gold-soft);
    opacity:.7;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .scroll-cue .line{
    width:1px; height:34px;
    background:var(--gold-soft);
    animation:pulse-line 2s ease-in-out infinite;
  }
  @keyframes pulse-line{
    0%,100%{ transform:scaleY(.6); opacity:.4; }
    50%{ transform:scaleY(1); opacity:1; }
  }

  /* ---------- EMPATHY ---------- */
  .empathy{
    background:var(--cream);
    padding:120px 0 100px;
    text-align:center;
  }
  .empathy .eyebrow{ color:var(--rose-deep); margin-bottom:18px; }
  .empathy h2{
    font-size:clamp(1.5rem,3.6vw,2.2rem);
    color:var(--plum);
    margin-bottom:50px;
    font-weight:600;
  }
  .empathy p{
    max-width:30em;
    margin:0 auto;
    color:var(--ink);
    font-size:1.02rem;
  }
  .empathy .block{ margin-bottom:6px; }

  /* ---------- ABOUT (dark) ---------- */
  .about{
    background:linear-gradient(160deg, var(--night-mid), var(--plum));
    color:var(--cream);
    padding:110px 24px;
    text-align:center;
  }
  .about .eyebrow{ color:var(--gold-soft); margin-bottom:20px; }
  .about h2{
    font-size:clamp(1.4rem,3.2vw,2rem);
    margin-bottom:28px;
    font-weight:600;
  }
  .about p{
    max-width:32em;
    margin:0 auto 14px;
    color:var(--cream-dim);
    font-size:.98rem;
  }
  .about .note{
    margin-top:36px;
    display:inline-block;
    border:1px solid rgba(226,205,154,.4);
    border-radius:14px;
    padding:18px 26px;
    font-size:.85rem;
    color:var(--gold-soft);
  }

  /* ---------- MENU / CARDS ---------- */
  .menu{
    background:var(--cream);
    padding:110px 0 100px;
  }
  .menu-head{ text-align:center; margin-bottom:70px; }
  .menu-head .eyebrow{ color:var(--rose-deep); margin-bottom:16px; }
  .menu-head h2{ font-size:clamp(1.5rem,3.6vw,2.2rem); color:var(--plum); }
  .card-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
  }
  @media (max-width:860px){ .card-grid{ grid-template-columns:1fr; max-width:420px; margin:0 auto;} }
  .tarot-card{
    perspective:1400px;
    height:400px;
  }
  .tarot-inner{
    position:relative;
    width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .8s cubic-bezier(.2,.7,.3,1);
  }
  .tarot-card:hover .tarot-inner, .tarot-card:focus-within .tarot-inner{
    transform:rotateY(180deg);
  }
  .tarot-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:18px;
    padding:34px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .tarot-face.front{
    background:linear-gradient(170deg, #fff, var(--cream-dim));
    border:1px solid rgba(201,166,104,.4);
    color:var(--ink);
    justify-content:space-between;
  }
  .tarot-face.back{
    background:
      radial-gradient(circle at 50% 30%, rgba(226,205,154,.25), transparent 60%),
      linear-gradient(170deg, var(--night-deep), var(--plum));
    color:var(--cream);
    transform:rotateY(180deg);
    justify-content:center;
    border:1px solid var(--gold);
  }
  .tarot-face .kicker{
    font-family:'Cormorant Garamond', serif;
    letter-spacing:.25em;
    font-size:.7rem;
    color:var(--rose-deep);
    margin-bottom:10px;
  }
  .tarot-face.back .kicker{ color:var(--gold-soft); }
  .tarot-face h3{ font-size:1.2rem; margin-bottom:14px; color:var(--plum); }
  .tarot-face .desc{ font-size:.85rem; color:var(--ink); opacity:.8; margin-bottom:20px; }
  .price-block .was{
    text-decoration:line-through;
    font-size:.82rem;
    opacity:.5;
  }
  .price-block .now{
    font-family:'Cormorant Garamond', serif;
    font-size:1.7rem;
    color:var(--rose-deep);
    font-weight:600;
  }
  .price-block .now span{ font-size:.9rem; }
  .tarot-face.back .star-mark{
    font-family:'Cormorant Garamond', serif;
    font-size:1.1rem;
    letter-spacing:.3em;
    color:var(--gold-soft);
    border:1px solid var(--gold-soft);
    border-radius:50%;
    width:78px; height:78px;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 16px;
  }
  .tarot-face.back .flip-note{
    font-size:.72rem;
    color:var(--cream-dim);
    opacity:.75;
  }
  .menu-note{
    text-align:center;
    margin-top:50px;
    font-size:.85rem;
    color:var(--plum);
    opacity:.85;
  }

  /* ---------- CHECKLIST ---------- */
  .checklist{
    background:var(--cream-dim);
    padding:110px 24px;
  }
  .checklist .wrap{
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:60px;
    align-items:center;
  }
  @media (max-width:820px){
